apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: kata-oc
  name: 50-kata-coldplug-config
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - path: /etc/crio/crio.conf.d/50-kata-coldplug
        mode: 0644
        contents:
          source: "data:text/plain;charset=utf-8;base64,"
      - path: /etc/kata-containers/config.d/50-coldplug.toml
        mode: 0644
        contents:
          source: "data:text/plain;charset=utf-8;base64,W2h5cGVydmlzb3IucWVtdV0KY29sZF9wbHVnX3ZmaW8gPSAicm9vdC1wb3J0IgoK"
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-coldplug
handler: kata-coldplug
overhead:
  podFixed:
    memory: "350Mi"
    cpu: "250m"
